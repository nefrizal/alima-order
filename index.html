<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alima Boga Batam</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E8600A">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alima Boga">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --or:#E8600A;--ord:#C04E06;--orl:#FFF3EB;
  --ink:#1A1208;--inkm:#5C4A35;--inks:#9C8672;
  --sur:#FFFBF7;--card:#fff;--bdr:#EDE3D8;
  --r:16px;--sh:0 6px 24px rgba(26,18,8,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;background:linear-gradient(160deg,#FFFBF7,#FFF3EB);
  color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:28px 20px;
}
.logo{width:104px;height:104px;border-radius:24px;box-shadow:0 10px 32px rgba(232,96,10,.28);margin-bottom:18px;}
.title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ord);text-align:center;}
.sub{font-size:13px;color:var(--inks);margin-top:4px;margin-bottom:32px;text-align:center;}
.menu{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;}
.card{
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);
  padding:20px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
  box-shadow:var(--sh);transition:transform .12s, box-shadow .12s;
}
.card:active{transform:scale(.97);}
.card-ico{
  width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.card-ico.absensi{background:#E6F5EE;}
.card-ico.order{background:var(--orl);}
.card-body{flex:1;}
.card-title{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--ink);}
.card-desc{font-size:12px;color:var(--inks);margin-top:2px;}
.card-arrow{font-size:20px;color:var(--inks);}
.footer{margin-top:36px;font-size:11px;color:var(--inks);text-align:center;}
</style>
</head>
<body>
  <img src="icons/icon-192.png" class="logo" alt="Alima Boga Batam">
  <div class="title">Alima Boga Batam</div>
  <div class="sub">Pilih aplikasi yang ingin dibuka</div>

  <div class="menu">
    <a class="card" href="https://bwahanad.github.io/absensi-sppg/">
      <div class="card-ico absensi">🕐</div>
      <div class="card-body">
        <div class="card-title">Absensi Karyawan</div>
        <div class="card-desc">Check-in / check-out lokasi kerja</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card" href="order.html">
      <div class="card-ico order">📋</div>
      <div class="card-body">
        <div class="card-title">Order &amp; Jadwal</div>
        <div class="card-desc">Sales order, revisi, jadwal pengiriman</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>

  <div class="footer">Alima Boga Batam &amp; KSM Katering</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register gagal:', err));
  });
}
</script>
</body>
</html>
