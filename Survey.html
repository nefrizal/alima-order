<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSM Katering — Survey Kepuasan</title>
<style>
  :root{--brand:#C8521A;--bg:#faf7f4;--card:#fff;--text:#2a2a2a;--muted:#8a8378;--star:#f0ad00;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;}
  body{background:var(--bg);color:var(--text);min-height:100vh;padding:16px;}
  .header{text-align:center;padding:20px 0;}
  .header h1{font-size:20px;color:var(--brand);}
  .header p{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5;}
  .card{max-width:440px;margin:0 auto 16px;background:var(--card);border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .q{margin-bottom:20px;}
  .q label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;}
  .stars{display:flex;gap:6px;font-size:32px;cursor:pointer;}
  .stars span{color:#ddd;transition:color .15s;}
  .stars span.filled{color:var(--star);}
  textarea{width:100%;min-height:80px;padding:10px;border-radius:10px;border:1px solid #e5ded5;font-size:14px;resize:vertical;}
  button{width:100%;padding:14px;border-radius:10px;border:none;background:var(--brand);color:#fff;font-weight:700;font-size:15px;cursor:pointer;}
  button:disabled{background:#ccc;}
  .done{text-align:center;padding:40px 16px;}
  .done h2{color:#2f9e44;margin-bottom:10px;}
  .hidden{display:none;}
</style>
</head>
<body>

<div class="header">
  <h1>🙏 Survey Kepuasan</h1>
  <p id="introText">Memuat data pesanan...</p>
</div>

<div class="card" id="formCard">
  <div class="q">
    <label>1. Apakah pesanan sesuai?</label>
    <div class="stars" data-field="pesanan">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
  </div>
  <div class="q">
    <label>2. Apakah masakan sesuai?</label>
    <div class="stars" data-field="masakan">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
  </div>
  <div class="q">
    <label>3. Delivery sesuai?</label>
    <div class="stars" data-field="delivery">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
  </div>
  <div class="q">
    <label id="labelKaryawan">4. Apakah karyawan kami melayani sesuai?</label>
    <div class="stars" data-field="karyawan">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
  </div>
  <div class="q">
    <label id="labelMasukan">5. Masukan untuk pelayanan lebih baik ke depannya:</label>
    <textarea id="masukan" placeholder="Tulis masukan Anda di sini..."></textarea>
  </div>
  <button id="btnKirim">Kirim Penilaian</button>
</div>

<div class="card done hidden" id="doneCard">
  <h2>✅ Terima Kasih!</h2>
  <p>Penilaian Anda sangat berarti untuk kami menjadi lebih baik.</p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyPgnhHNpbAWQbt4sNQiLFaDTRN-emDLn_rV68GVpvkdFAbFd41fyZxdMJUMqHdI1Zp/exec";
const params = new URLSearchParams(window.location.search);
const noOrder = params.get("no");
const token = params.get("token");

const ratings = { pesanan: 0, masakan: 0, delivery: 0, karyawan: 0 };

function jsonp(url, p) {
  return new Promise((resolve) => {
    const cb = "cb_" + Date.now();
    window[cb] = (data) => { resolve(data); delete window[cb]; document.body.removeChild(script); };
    const qs = new URLSearchParams({...p, callback: cb}).toString();
    const script = document.createElement("script");
    script.src = url + "?" + qs;
    document.body.appendChild(script);
  });
}

document.querySelectorAll(".stars").forEach(starGroup => {
  const field = starGroup.dataset.field;
  starGroup.querySelectorAll("span").forEach(star => {
    star.addEventListener("click", () => {
      const v = parseInt(star.dataset.v);
      ratings[field] = v;
      starGroup.querySelectorAll("span").forEach(s => {
        s.classList.toggle("filled", parseInt(s.dataset.v) <= v);
      });
    });
  });
});

async function initSurvey() {
  if (!noOrder || !token) {
    document.getElementById("introText").textContent = "Link tidak valid.";
    document.getElementById("formCard").classList.add("hidden");
    return;
  }
  const res = await jsonp(API_URL, { action: "get_survey_order", no: noOrder, token: token });
  if (!res.ok) {
    document.getElementById("introText").textContent = res.error;
    document.getElementById("formCard").classList.add("hidden");
    return;
  }
  const o = res.order;
  document.getElementById("introText").textContent =
    `Terima kasih atas kepercayaan Ibu/Bapak, kemarin telah order ${o.paket} sebanyak ${o.qty}.`;
  document.getElementById("labelKaryawan").textContent =
    `4. Apakah karyawan kami melayani ${o.sebutan} sesuai?`;
  document.getElementById("labelMasukan").textContent =
    `5. Untuk pelayanan lebih baik ke depan, mohon masukan ${o.sebutan} kepada kami:`;
}

document.getElementById("btnKirim").addEventListener("click", async () => {
  if (!ratings.pesanan || !ratings.masakan || !ratings.delivery || !ratings.karyawan) {
    alert("Mohon isi semua penilaian bintang ya 🙏");
    return;
  }
  const btn = document.getElementById("btnKirim");
  btn.disabled = true;
  btn.textContent = "Mengirim...";

  const res = await jsonp(API_URL, {
    action: "submit_survey",
    no: noOrder,
    token: token,
    rating_pesanan: ratings.pesanan,
    rating_masakan: ratings.masakan,
    rating_delivery: ratings.delivery,
    rating_karyawan: ratings.karyawan,
    masukan: document.getElementById("masukan").value,
  });

  if (res.ok) {
    document.getElementById("formCard").classList.add("hidden");
    document.getElementById("doneCard").classList.remove("hidden");
  } else {
    alert("Gagal mengirim: " + res.error);
    btn.disabled = false;
    btn.textContent = "Kirim Penilaian";
  }
});

initSurvey();
</script>
</body>
</html>
